const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryPw(pw) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(SALT), iterations: 300000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(IV) }, key, b64(CT));
  return new TextDecoder().decode(plain);
}
async function unlock(pw, remember) {
  try {
    const html = await tryPw(pw);
    if (remember) localStorage.setItem("labs_pw", pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    localStorage.removeItem("labs_pw");
    document.getElementById("err").textContent = "Wrong password.";
  }
}
document.getElementById("f").addEventListener("submit", ev => {
  ev.preventDefault();
  unlock(document.getElementById("pw").value, true);
});
const saved = localStorage.getItem("labs_pw");
if (saved) unlock(saved, false);
